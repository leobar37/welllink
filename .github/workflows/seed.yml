name: Seed Database

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to use'
        required: false
        default: 'latest'
        type: string
      clean:
        description: 'Clean existing data before seeding'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: read

jobs:
  seed:
    name: 🌱 Seed Database
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: Production

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run seed script
        run: |
          CLEAN_FLAG=""
          if [ "${{ inputs.clean }}" = "true" ]; then
            CLEAN_FLAG="--clean"
          fi

          docker run --rm \
            -e DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/wellness-link-api:${{ inputs.image_tag }} \
            bun run db:seed $CLEAN_FLAG
